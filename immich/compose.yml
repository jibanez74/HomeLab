name: immich-v2

services:
  ts-authkey-immich-v2:
    image: tailscale/tailscale:${TAILSCALE_IMAGE_TAG:-latest}
    container_name: immich-v2-tailscale
    hostname: ${IMMICH_TS_HOSTNAME:-photos-v2}
    environment:
      - TS_AUTHKEY=${TS_KEY:?}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_AUTH_ONCE=true
    volumes:
      - ./tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    healthcheck:
      test: ["CMD", "tailscale", "status", "--peers=false"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  immich-server:
    container_name: immich-v2-server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v2}
    extends:
      file: hwaccel.transcoding.yml
      service: nvenc
    volumes:
      - ${UPLOAD_LOCATION:?}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    network_mode: service:ts-authkey-immich-v2
    depends_on:
      valkey:
        condition: service_healthy
      database:
        condition: service_healthy
      ts-authkey-immich-v2:
        condition: service_healthy
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich-v2-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v2}-cuda
    extends:
      file: hwaccel.ml.yml
      service: cuda
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  valkey:
    container_name: immich-v2-valkey
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping || exit 1"]
    restart: always

  database:
    container_name: immich-v2-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?}
      POSTGRES_USER: ${DB_USERNAME:?}
      POSTGRES_DB: ${DB_DATABASE_NAME:?}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION:?}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

volumes:
  model-cache:
